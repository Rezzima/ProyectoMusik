<div class="containerTable">
    <table class="table table-bordered">
        <thead>
            <th scope="col">Producto</th>
            <th scope="col">Precio</th>
            <th scope="col">Acciones</th>
        </thead>
        <tbody>
            @for(p of productosEnCarrito; track p.id) {
            <tr>
                <th class="row"></th>
                <div>
                    <td>{{ p.nombre }}</td>
                </div>
                <td>${{ p.precio*p.cant }}</td>
                <div class="buttons">
                    <button class="btn" (click)="disminuir(p.id)">
                        -
                    </button>
                    <td>{{ p.cant }}</td>
                    <button class="btn" (click)="aumentar(p.id)">
                        +
                    </button>
                    <button class="btn btn-danger" style="margin-left: 5px;" (click)="eliminar(p.id)">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </tr>
            }
        </tbody>
        <tfoot>
            <tr>
                <th scope="row" colspan="3">Precio Final</th>
                <td>$30</td>
            </tr>
        </tfoot>
    </table>
</div>
