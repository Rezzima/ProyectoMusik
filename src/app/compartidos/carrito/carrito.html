<div class="containerTable">
    <table class="table table-bordered">
        <thead>
            <th scope="col">Producto</th>
            <th scope="col">Precio</th>
            <th scope="col">Acciones</th>
        </thead>
        <tbody>
            @for(p of productosEnCarrito; track p.id) {
            <tr>
                <th class="row"></th>
                <div>
                    <td>{{ p.nombre }}</td>
                </div>
                <td>${{ p.precio*p.cant }}</td>
                <div class="buttons" style="margin: 5px;">
                    <button class="btn btn-primary" (click)="disminuir(p.id)" style="margin: 5px;">
                        -
                    </button>
                    <td class="fuente">{{ p.cant }}</td>
                    <button class="btn btn-primary" (click)="aumentar(p.id)" style="margin: 5px;">
                        +
                    </button>
                    <button class="btn btn-danger" style="margin-left: 5px;" (click)="eliminar(p.id)">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </tr>
            }
        </tbody>
        <tfoot class="footerCarrito">
            <tr>
                <th scope="row" colspan="3">Precio Final</th>
                <td>{{ total }}</td>
            </tr>
            <tr class="buttonsContainer">
                <td colspan="4" style="text-align: right;">
                    <button routerLink="/comprar" routerLinkActive="True" class="btn btn-success" (click)="carritoComprar()" style="margin-right: 15px;">comprar</button>
                    <button class="btn btn-danger" (click)="eliminarCarrito()"><i class="bi bi-trash-fill"></i></button>
                </td>
            </tr>
        </tfoot>
    </table>
</div>
