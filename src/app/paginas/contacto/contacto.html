<h1 class="Title">Contacto</h1>
<div class="contactFather">
    <form id="formContact">
        <div class="mb-3">
            <label for="exampleName" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="exampleName">
        </div>
        <div class="mb-3">
            <label for="exampleLastName" class="form-label">Apellido</label>
            <input type="text" class="form-control" id="exampleLastName">
        </div>
        <div class="mb-3">
            <label for="exampleEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="exampleEmail">
            <div id="emailHelp" class="form-text">No vamos a divulgar este mail con nadie</div>
        </div>
        <div class="mb-3">
            <label for="exampleTel" class="form-label">Número telefónico</label>
            <input type="tel" class="form-control" id="exampleTel">
        </div>
        <div class="mb-3">
            <label for="exampleReason" class="form-label">Razón de contacto</label>
            <textarea class="form-control" id="exampleReason"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
</div>
