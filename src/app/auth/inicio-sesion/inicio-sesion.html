<h1 class="Title">Inicio Sesion</h1>
<div class="loginFather">
    <form id="formLogin">
        <div class="mb-3">
            <label for="exampleEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="exampleEmail">
            <div id="emailHelp" class="form-text"></div>
        </div>
        <div class="mb-3">
             <div class="input-group">
                <input [type]="showPassword ? 'text' : 'password'" class="form-control" id="examplePassword">
                <button type="button" (click)="togglePasswordVisibility()" style="color: black;"><i
                        [class]="showPassword ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill'"></i> </button>
            </div>
            <div id="passwordHelp" class="form-text-password"> ¿Olvidaste tu contraseña? <a href="" class="resetPassword">Reestablecela acá</a></div>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
</div>
