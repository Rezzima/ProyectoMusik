<h1 class="Title">Registro</h1>
<div class="registerFather">
    <form id="formRegister">
        <div class="mb-3">
            <label for="exampleName" class="form-label">Tu nombre</label>
            <input type="text" class="form-control" id="exampleName">
            <div id="emailHelp" class="form-text"></div>
        </div>
        <div class="mb-3">
            <label for="exampleEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="exampleEmail">
            <div id="emailHelp" class="form-text">No vamos a divulgar este mail con nadie</div>
        </div>
        <div class="mb-3">
            <label for="examplePassword" class="form-label">Contraseña</label>
            <div class="input-group">
                <input [type]="showPassword ? 'text' : 'password'" class="form-control" id="examplePassword">
                <button type="button" (click)="togglePasswordVisibility()" style="color: black;"> <i
                        [class]="showPassword ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill'"></i> </button>
            </div>
        </div>
        <div class="mb-3">
            <label for="examplePassword" class="form-label">Repetí la Contraseña</label>
            <input type="password" class="form-control" id="examplePassword">
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>
</div>
